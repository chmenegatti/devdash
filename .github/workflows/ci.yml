name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐹 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: go.sum

      - name: ⚙️ Pin toolchain to local
        run: go env -w GOTOOLCHAIN=local

      - name: 📦 Download dependencies
        run: go mod download

      - name: 🔨 Build
        run: go build ./...

      - name: 🔍 Vet
        run: go vet ./...

      - name: 🧪 Test
        run: go test ./... -v -race

      - name: 📈 Coverage
        run: go test ./internal/modules -coverprofile=coverage.out

      - name: 📊 Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐹 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: go.sum

      - name: ⚙️ Pin toolchain to local
        run: go env -w GOTOOLCHAIN=local

      - name: 🧰 Cache golangci-lint binary
        id: cache-golangci
        uses: actions/cache@v4
        with:
          path: ~/go/bin/golangci-lint
          key: ${{ runner.os }}-golangci-lint-v2-2.10.1

      - name: 📦 Install golangci-lint
        if: steps.cache-golangci.outputs.cache-hit != 'true'
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.10.1

      - name: 🛣️ Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: 🔍 Run golangci-lint
        run: golangci-lint run
