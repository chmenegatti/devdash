name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐹 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: go.sum

      - name: ⚙️ Pin toolchain to local
        run: go env -w GOTOOLCHAIN=local

      - name: 🧪 Test
        run: go test ./... -v

      - name: 🏗 Build binaries
        run: |
          mkdir -p dist

          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch <<<"$target"

            ext=""
            if [[ "$goos" == "windows" ]]; then
              ext=".exe"
            fi

            bin_name="devdash_${goos}_${goarch}${ext}"
            out_path="dist/${bin_name}"

            echo "Building ${out_path}"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 go build -ldflags "-s -w" -o "$out_path" ./cmd/dashboard
          done

      - name: 🧾 Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          files: |
            dist/*