version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - misspell
  settings:
    misspell:
      locale: US
  exclusions:
    rules: 
      - path: 'vendor/.*'
        linters:
          - funlen
          - goconst
issues:
  max-issues-per-linter: 50
  max-same-issues: 5


